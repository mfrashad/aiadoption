// --- Utilities ---
function fmtPop(m) {
  if (m >= 1000) return (m/1000).toFixed(m>=1400?2:1) + "B";
  if (m >= 1) return m.toFixed(m>=100?0:1) + "M";
  return Math.round(m*1000) + "K";
}
function fmtNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + "B";
  if (n >= 1e6) return (n/1e6).toFixed(n>=1e8?0:1) + "M";
  if (n >= 1e3) return (n/1e3).toFixed(n>=1e5?0:0) + "K";
  return n.toFixed(0);
}
function fmtPct(p) { return p < 0.1 ? "<0.1%" : p.toFixed(1) + "%"; }

function computeDots(country) {
  const c = country;
  const talentPct = c.aiWorkforce + c.researchers;
  const paidPct = c.paid;
  const freePct = Math.max(0, c.adoption - paidPct - talentPct);
  const neverPct = Math.max(0, 100 - c.adoption);

  let talentDots = Math.max(1, Math.round((talentPct / 100) * GRID));
  let paidDots = Math.max(1, Math.round((paidPct / 100) * GRID));
  let freeDots = Math.max(0, Math.round((freePct / 100) * GRID));
  let neverDots = GRID - talentDots - paidDots - freeDots;

  if (neverDots < 0) {
    freeDots += neverDots;
    neverDots = 0;
  }

  const arr = [];
  for (let i = 0; i < talentDots; i++) arr.push("talent");
  for (let i = 0; i < paidDots; i++) arr.push("paid");
  for (let i = 0; i < freeDots; i++) arr.push("free");
  for (let i = 0; i < neverDots; i++) arr.push("never");
  return { arr, talentPct, paidPct, freePct, neverPct, talentDots, paidDots, freeDots, neverDots };
}

              fontFamily:FM, fontSize:11, padding:"4px 10px", borderRadius:20,
              border: c.id === selId ? "1.5px solid #d4a843" : "1.5px solid #333",
              background: c.id === selId ? "rgba(212,168,67,0.15)" : "transparent",
              color: c.id === selId ? "#eec050" : "#8a857a",
              cursor:"pointer", transition:"all 0.2s", whiteSpace:"nowrap",
            }}
            onMouseEnter={e => { if (c.id !== selId) { e.target.style.borderColor="#555"; e.target.style.color="#b0a998"; }}}
            onMouseLeave={e => { if (c.id !== selId) { e.target.style.borderColor="#333"; e.target.style.color="#8a857a"; }}}
          >
            {c.flag} {c.name}
          </button>
        ))}
      </div>

      {/* Sort controls */}
      <div style={{display:"flex", justifyContent:"center", gap:16, marginBottom:16}}>
        {[["adoption","by adoption"], ["population","by population"], ["name","A\u2013Z"]].map(([v,l]) => (
          <button
            key={v}
            onClick={() => setSortBy(v)}
            style={{
              fontFamily:FM, fontSize:10, color: sortBy===v ? "#d4a843" : "#666",
              background:"none", border:"none", cursor:"pointer",
              borderBottom: sortBy===v ? "1px solid #d4a843" : "1px solid transparent",
              paddingBottom:2, transition:"all 0.2s",
            }}
          >{l}</button>
        ))}
      </div>

      {/* Highlight */}
      <p style={{
        fontFamily:FM, fontSize:11, textAlign:"center", color:"#d4a843",
        marginBottom:16, minHeight:32, lineHeight:1.4, padding:"0 12px",
        transition:"opacity 0.3s", opacity: 1,
      }}>
        {country.highlight}
      </p>

      {/* Dot Grid */}
      <div style={{
        display:"grid",
        gridTemplateColumns:`repeat(${COLS}, 1fr)`,
        gap:2,
        maxWidth:340,
        margin:"0 auto 20px",
        padding:4,
      }}>
        {dots.arr.map((cat, i) => {
          const isHov = hovCat === null || hovCat === cat;
          const c = CATS.find(x=>x.id===cat);
          return (
            <div
              key={i}
              style={{
                aspectRatio:"1/1",
                borderRadius:2,
                backgroundColor: isHov ? c.active : c.color,
                opacity: isHov ? (hovCat===cat ? 1 : 0.75) : 0.06,
                transition:`background-color 0.35s ease ${i*1.5}ms, opacity 0.3s ease`,
              }}
            />
          );
        })}
      </div>

      {/* Legend */}
      <div style={{display:"flex", flexWrap:"wrap", justifyContent:"center", gap:"8px 20px", marginBottom:8, maxWidth:520, margin:"0 auto 20px"}}>
        {CATS.map(cat => {
          const s = catStats[cat.id];
          return (
            <div
              key={cat.id}
              style={{
                display:"flex", alignItems:"center", gap:6, cursor:"pointer",
                opacity: hovCat === null || hovCat === cat.id ? 1 : 0.3,
                transition:"opacity 0.2s",
              }}
              onMouseEnter={() => setHovCat(cat.id)}
              onMouseLeave={() => setHovCat(null)}
            >
              <div style={{width:10, height:10, borderRadius:1.5, backgroundColor:cat.active, flexShrink:0}} />
              <div>
                <span style={{fontFamily:FS, fontSize:11, color:"#b0a998"}}>{cat.label}</span>
                <span style={{fontFamily:FM, fontSize:11, color:"#e8e4de", marginLeft:6}}>
                  {fmtPct(s.pct)}
                </span>
                <span style={{fontFamily:FM, fontSize:10, color:"#666", marginLeft:4}}>
                  ({fmtPop(s.abs)})
                </span>
              </div>
            </div>
          );
        })}
      </div>

      {/* Detail */}
      <p style={{fontFamily:FS, fontSize:11, textAlign:"center", color:"#666", marginBottom:20, lineHeight:1.4, padding:"0 20px"}}>
        {country.detail}
      </p>

      {/* Key stats row */}
      <div style={{display:"flex", justifyContent:"center", gap:24, flexWrap:"wrap", marginBottom:28}}>
        {[
          {label:"Population", value:fmtPop(country.pop)},
          {label:"AI Users", value:fmtPop(totalAiUsers)},
          {label:"Adoption", value:country.adoption.toFixed(1)+"%"},
          {label:"AI Investment", value:country.aiInvestment},
        ].map(({label,value}) => (
          <div key={label} style={{textAlign:"center"}}>
            <div style={{fontFamily:FM, fontSize:18, fontWeight:700, color:"#e8e4de"}}>{value}</div>
            <div style={{fontFamily:FM, fontSize:9, color:"#666", textTransform:"uppercase", letterSpacing:1}}>{label}</div>
          </div>
        ))}
      </div>

      {/* Ticker */}
      <div style={{
        borderTop:"1px solid #1a1a1a", borderBottom:"1px solid #1a1a1a",
        padding:"10px 16px", marginBottom:28, textAlign:"center",
        minHeight:36,
      }}>
        <p style={{
          fontFamily:FM, fontSize:10, color:"#8a857a", lineHeight:1.5,
          opacity: fv ? 1 : 0, transition:"opacity 0.4s ease",
        }}>
          {TICKER[fi]}
        </p>
      </div>

      {/* Comparison Bars */}
      <h2 style={{fontFamily:FS, fontSize:16, fontWeight:700, marginBottom:16, textAlign:"center"}}>
        Comparison
      </h2>
      <div style={{maxWidth:600, margin:"0 auto 28px"}}>
        {sorted.map(c => {
          const isSel = c.id === selId;
          const barW = (c.adoption / 70) * 100; // 70% max scale
          return (
            <div
              key={c.id}
              onClick={() => selectCountry(c.id)}
              style={{
                display:"flex", alignItems:"center", gap:8, marginBottom:4,
                cursor:"pointer", padding:"3px 0",
                opacity: isSel ? 1 : 0.6,
                transition:"opacity 0.2s",
              }}
              onMouseEnter={e => e.currentTarget.style.opacity = "1"}
              onMouseLeave={e => { if (!isSel) e.currentTarget.style.opacity = "0.6"; }}
            >
              <div style={{width:80, fontFamily:FM, fontSize:10, color: isSel ? "#eec050" : "#8a857a", textAlign:"right", flexShrink:0}}>
                {c.flag} {c.name}
              </div>
              <div style={{flex:1, height:14, background:"#1a1a1a", borderRadius:2, overflow:"hidden", position:"relative"}}>
                {/* Stacked bar segments */}
                {(() => {
                  const d = computeDots(c);
                  const segments = [
                    {id:"talent", pct: d.talentPct},
                    {id:"paid", pct: d.paidPct},
                    {id:"free", pct: d.freePct},
                  ];
                  let offset = 0;
                  return segments.map(seg => {
                    const w = (seg.pct / 70) * 100;
                    const left = offset;
                    offset += w;
                    const cat = CATS.find(x=>x.id===seg.id);
                    return (
                      <div
                        key={seg.id}
                        style={{
                          position:"absolute", top:0, bottom:0,
                          left: left+"%", width: w+"%",
                          backgroundColor: isSel ? cat.active : cat.color,
                          transition:"width 0.4s ease, background-color 0.3s",
                        }}
                      />
                    );
                  });
                })()}
              </div>
              <div style={{width:40, fontFamily:FM, fontSize:10, color: isSel ? "#e8e4de" : "#666", flexShrink:0}}>
                {c.adoption.toFixed(1)}%
              </div>
            </div>
          );
        })}
      </div>

      {/* Absolute Users Comparison */}
      <h2 style={{fontFamily:FS, fontSize:16, fontWeight:700, marginBottom:16, textAlign:"center"}}>
        Total AI Users (absolute)
      </h2>
      <div style={{maxWidth:600, margin:"0 auto 28px"}}>
        {[...COUNTRIES].sort((a,b) => (b.pop*b.adoption) - (a.pop*a.adoption)).map(c => {
          const users = c.pop * c.adoption / 100;
          const maxUsers = 602; // China
          const isSel = c.id === selId;
          return (
            <div
              key={c.id}
              onClick={() => selectCountry(c.id)}
              style={{
                display:"flex", alignItems:"center", gap:8, marginBottom:4,
                cursor:"pointer", padding:"3px 0",
                opacity: isSel ? 1 : 0.6,
                transition:"opacity 0.2s",
              }}
              onMouseEnter={e => e.currentTarget.style.opacity = "1"}
              onMouseLeave={e => { if (!isSel) e.currentTarget.style.opacity = "0.6"; }}
            >
              <div style={{width:80, fontFamily:FM, fontSize:10, color: isSel ? "#eec050" : "#8a857a", textAlign:"right", flexShrink:0}}>
                {c.flag} {c.name}
              </div>
              <div style={{flex:1, height:14, background:"#1a1a1a", borderRadius:2, overflow:"hidden"}}>
                <div style={{
                  height:"100%", width: (users/maxUsers*100)+"%",
                  backgroundColor: isSel ? "#6fcc84" : "#5aaa6e",
                  borderRadius:2,
                  transition:"width 0.4s ease",
                }} />
              </div>
              <div style={{width:48, fontFamily:FM, fontSize:10, color: isSel ? "#e8e4de" : "#666", flexShrink:0}}>
                {fmtPop(users)}
              </div>
            </div>
          );
        })}
      </div>

      {/* FAQ */}
      <div style={{borderTop:"1px solid #1a1a1a", paddingTop:20, marginBottom:20}}>
        <h2 style={{fontFamily:FS, fontSize:16, fontWeight:700, marginBottom:12, textAlign:"center"}}>FAQ</h2>
        {FAQS.map((f,i) => (
          <div key={i} style={{borderBottom:"1px solid #1a1a1a", padding:"10px 0"}}>
            <button
              onClick={() => setFaqOpen(faqOpen === i ? null : i)}
              style={{
                background:"none", border:"none", color:"#b0a998", cursor:"pointer",
                fontFamily:FS, fontSize:13, textAlign:"left", width:"100%",
                display:"flex", justifyContent:"space-between", alignItems:"center",
              }}
            >
              {f.q}
              <span style={{fontFamily:FM, fontSize:14, color:"#666", marginLeft:8, flexShrink:0, transition:"transform 0.2s", transform: faqOpen===i?"rotate(45deg)":"rotate(0)"}}>+</span>
            </button>
            {faqOpen === i && (
              <div style={{fontFamily:FS, fontSize:12, color:"#666", lineHeight:1.6, marginTop:8, padding:"0 4px", whiteSpace:"pre-line"}}>
                {f.a}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Sources */}
      <div style={{marginBottom:20}}>
        <button
          onClick={() => setShowSrc(!showSrc)}
          style={{
            fontFamily:FM, fontSize:11, color:"#666", background:"none",
            border:"1px solid #333", borderRadius:4, padding:"6px 14px",
            cursor:"pointer", display:"block", margin:"0 auto",
            transition:"all 0.2s",
          }}
          onMouseEnter={e => { e.target.style.borderColor="#555"; e.target.style.color="#8a857a"; }}
          onMouseLeave={e => { e.target.style.borderColor="#333"; e.target.style.color="#666"; }}
        >
          {showSrc ? "Hide" : "Show"} Sources ({SOURCES.length})
        </button>
        {showSrc && (
          <ol style={{fontFamily:FM, fontSize:10, color:"#666", lineHeight:1.8, marginTop:12, paddingLeft:20}}>
            {SOURCES.map((s,i) => (
              <li key={i}><a href={s.u} target="_blank" rel="noopener">{s.n}</a></li>
            ))}
          </ol>
        )}
      </div>

      {/* API Section */}
      <div style={{borderTop:"1px solid #1a1a1a", paddingTop:20, marginBottom:20}}>
        <h2 style={{fontFamily:FS, fontSize:16, fontWeight:700, marginBottom:8, textAlign:"center"}}>Open Data API</h2>
        <p style={{fontFamily:FS, fontSize:12, color:"#8a857a", textAlign:"center", lineHeight:1.6, marginBottom:12}}>
          All the data on this page is available as a free JSON API. Use it in your projects, research, or apps.
        </p>
        <div style={{
          background:"#141414", border:"1px solid #222", borderRadius:6,
          padding:"12px 16px", maxWidth:520, margin:"0 auto 12px",
          fontFamily:FM, fontSize:11, color:"#6fcc84", wordBreak:"break-all", lineHeight:1.5,
        }}>
          <span style={{color:"#666"}}>GET</span>{" "}
          <a href="/api/v1/countries.json" target="_blank" rel="noopener" style={{color:"#6fcc84"}}>
            /api/v1/countries.json
          </a>
        </div>
        <div style={{
          background:"#141414", border:"1px solid #222", borderRadius:6,
          padding:"12px 16px", maxWidth:520, margin:"0 auto 12px",
          fontFamily:FM, fontSize:10, color:"#b0a998", lineHeight:1.7, whiteSpace:"pre-wrap",
        }}>
{`// Example usage
fetch('/api/v1/countries.json')
  .then(r => r.json())
  .then(data => {
    const top = data.countries
      .sort((a, b) => b.adoption - a.adoption)
      .slice(0, 5);
    console.log(top);
  });`}
        </div>
        <p style={{fontFamily:FM, fontSize:10, color:"#555", textAlign:"center", lineHeight:1.5}}>
          Includes population, adoption rates, paid/free breakdown, AI workforce, investment data, and sources for 16 countries.
          {" "}
          <a href="https://github.com/mfrashad/aiadoption" target="_blank" rel="noopener">View on GitHub</a>
        </p>
      </div>

      {/* Footer */}
      <div style={{borderTop:"1px solid #1a1a1a", paddingTop:16, textAlign:"center"}}>
        <p style={{fontFamily:FM, fontSize:9, color:"#444", lineHeight:1.6, maxWidth:500, margin:"0 auto"}}>
          Data compiled from multiple sources with different methodologies.
          Adoption rates primarily from Microsoft AI Diffusion Report (H2 2025) measuring working-age population gen AI usage.
          Paid/free splits and AI workforce sizes are estimates based on aggregate data.
          See FAQ and sources for methodology details.
        </p>
        <p style={{fontFamily:FM, fontSize:9, color:"#333", marginTop:8}}>
          Inspired by <a href="https://global-ai-adoption.netlify.app/" target="_blank" rel="noopener">global-ai-adoption.netlify.app</a>
          {" \u00B7 "}
          Part of <a href="https://aiforgood.my" target="_blank" rel="noopener">aiforgood.my</a>
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
